# Refuge Meeting Assistant — Local Development Stack
# docker compose up -d
#
# Services:
#   - LocalStack (SQS/S3 on port 4566)
#   - .NET API (port 5000)
#
# NOTE: SQL Server removed to avoid MCR dependency. The API starts gracefully
# without a database (logs a warning, DB operations will fail but API runs).
# For full DB support, add a PostgreSQL service and swap the EF Core provider.

services:
  # ---- LocalStack (Mock AWS: SQS, S3) ----
  localstack:
    image: localstack/localstack:latest
    environment:
      - SERVICES=sqs,s3
      - DEFAULT_REGION=us-east-1
      - DOCKER_HOST=unix:///var/run/docker.sock
    ports:
      - "4566:4566"
    volumes:
      - localstack-data:/var/lib/localstack
      - ./localstack-init:/etc/localstack/init/ready.d
    healthcheck:
      test: awslocal sqs list-queues || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---- .NET API ----
  api:
    build:
      context: ./src/RefugeMeetingAssistant.Api
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=localhost;Database=RefugeMeetingAssistant;TrustServerCertificate=true
      - Auth__UseDev=true
      - AWS__Region=us-east-1
      - AWS__SQS__ServiceUrl=http://localstack:4566
      - AWS__SQS__BotCommandsQueueUrl=http://localstack:4566/000000000000/refuge-meeting-bot-commands
      - AWS__SQS__ProcessingQueueUrl=http://localstack:4566/000000000000/refuge-meeting-processing
      - AWS__Bedrock__UseMock=true
    depends_on:
      localstack:
        condition: service_healthy

  # ---- VP Bot (Virtual Participant Bot) ----
  vpbot:
    build:
      context: ./src/RefugeMeetingAssistant.VPBot
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - AWS__Region=us-east-1
      - AWS__SQS__ServiceUrl=http://localstack:4566
      - AWS__SQS__BotCommandsQueueUrl=http://localstack:4566/000000000000/refuge-meeting-bot-commands
    depends_on:
      localstack:
        condition: service_healthy

volumes:
  localstack-data:
